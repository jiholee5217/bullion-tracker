<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullion Tracker — Live Prices</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #070707; min-height: 100vh; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes flashGreen { 0%{box-shadow:0 0 0 2px #2ecc7166} 100%{box-shadow:none} }
    @keyframes flashRed { 0%{box-shadow:0 0 0 2px #e74c3c66} 100%{box-shadow:none} }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .flash-up { animation: flashGreen 0.8s ease forwards; }
    .flash-down { animation: flashRed 0.8s ease forwards; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0908; }
    ::-webkit-scrollbar-thumb { background: #2a2510; border-radius: 3px; }
    button { cursor: pointer; }
    button:disabled { cursor: default; opacity: 0.5; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
// To get a free Finnhub key for S&P 500: https://finnhub.io/register (takes 30 sec)
// Paste it below, or leave empty to use the no-key mode (slower fallback)
const FINNHUB_KEY = "d6fra59r01qqnmbpo5v0d6fra59r01qqnmbpo5vg";

const ASSETS = {
  gold:    { label:"Gold",    sym:"XAU", color:"#D4AF37", glow:"rgba(212,175,55,0.15)",  icon:"⚜",  fmt:"$,.2f", unit:"/troy oz" },
  silver:  { label:"Silver",  sym:"XAG", color:"#A8B8C8", glow:"rgba(168,184,200,0.10)", icon:"◈",  fmt:"$,.3f", unit:"/troy oz" },
  bitcoin: { label:"Bitcoin", sym:"BTC", color:"#F7931A", glow:"rgba(247,147,26,0.13)",  icon:"₿",  fmt:"$,.0f", unit:"/coin"    },
  sp500:   { label:"S&P 500", sym:"SPY", color:"#5B9BD5", glow:"rgba(91,155,213,0.12)",  icon:"📊", fmt:"$,.2f", unit:"(SPY ETF)" },
};

function fmtPrice(v, id) {
  if (v == null) return "—";
  if (id === "bitcoin") return "$" + Math.round(v).toLocaleString();
  if (id === "gold")    return "$" + v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  if (id === "silver")  return "$" + v.toFixed(3);
  return "$" + v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtChange(c, id) {
  if (c == null) return "—";
  const abs = Math.abs(c);
  const sign = c >= 0 ? "+" : "−";
  if (id === "bitcoin") return sign + "$" + Math.round(abs).toLocaleString();
  if (id === "silver")  return sign + "$" + abs.toFixed(3);
  return sign + "$" + abs.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ─── API FETCHERS ────────────────────────────────────────────────────────────

// Calculate 24h change by fetching last 2 days of CoinGecko market chart
// This works for bitcoin, and we use gold-api.com for metals price + open as prev
async function fetchMetal(sym) {
  // Finnhub futures symbols: GC=F (gold) and SI=F (silver) — available on free tier
  const futureSym = sym === "XAU" ? "GC=F" : "SI=F";
  if (FINNHUB_KEY) {
    try {
      const r = await fetch(
        `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(futureSym)}&token=${FINNHUB_KEY}`,
        { cache: "no-store" }
      );
      if (r.ok) {
        const d = await r.json();
        if (d.c && d.c > 0) {
          // Silver futures are quoted per troy oz * 5000 on SI=F, need /5000 — actually SI=F is already per oz
          // GC=F is gold per troy oz, SI=F is silver per troy oz (both CME continuous)
          return { price: d.c, prev: d.pc, change: d.d ?? (d.c - d.pc), changePct: d.dp ?? ((d.c - d.pc) / d.pc * 100), source: "Finnhub" };
        }
      }
    } catch(e) {}
  }
  // Fallback: gold-api.com (price only, no reliable change)
  const priceRes = await fetch(`https://api.gold-api.com/price/${sym}`, { cache: "no-store" });
  if (!priceRes.ok) throw new Error(`gold-api ${sym}: HTTP ${priceRes.status}`);
  const d = await priceRes.json();
  if (!d.price) throw new Error(`No price for ${sym}`);
  return { price: parseFloat(d.price), prev: parseFloat(d.price), change: 0, changePct: 0, source: "gold-api.com" };
}

async function fetchBitcoin() {
  // Kraken public REST API — CORS enabled, no key needed
  const r = await fetch("https://api.kraken.com/0/public/Ticker?pair=XBTUSD", { cache: "no-store" });
  if (!r.ok) throw new Error(`Kraken BTC: HTTP ${r.status}`);
  const d = await r.json();
  if (d.error && d.error.length) throw new Error(`Kraken: ${d.error[0]}`);
  const t = d.result.XXBTZUSD;
  const price     = parseFloat(t.c[0]);   // last trade price
  const open      = parseFloat(t.o);      // today's opening price
  const change    = price - open;
  const changePct = (change / open) * 100;
  return { price, prev: open, change, changePct, source: "Kraken" };
}

async function fetchSP500() {
  // Finnhub quote endpoint — requires key but we have one
  if (FINNHUB_KEY) {
    const r = await fetch(
      `https://finnhub.io/api/v1/quote?symbol=SPY&token=${FINNHUB_KEY}`,
      { cache: "no-store" }
    );
    if (!r.ok) throw new Error(`Finnhub: HTTP ${r.status}`);
    const d = await r.json();
    if (!d.c) throw new Error("Finnhub: no price");
    return { price: d.c, prev: d.pc, change: d.d, changePct: d.dp, source: "Finnhub (SPY ETF)" };
  }
  // Fallback: Stooq via CORS proxy
  const url = encodeURIComponent("https://stooq.com/q/l/?s=spy.us&f=sd2t2ohlcv&h&e=csv");
  const r = await fetch(`https://api.allorigins.win/get?url=${url}`, { cache: "no-store" });
  if (!r.ok) throw new Error("Stooq proxy unavailable");
  const j = await r.json();
  const lines = (j.contents || "").trim().split("\n");
  if (lines.length < 2) throw new Error("Stooq: no data");
  const today = lines[1].split(",");
  const prev_line = lines[2] ? lines[2].split(",") : null;
  const price = parseFloat(today[6]);
  const prev  = prev_line ? parseFloat(prev_line[6]) : parseFloat(today[3]);
  return { price, prev, change: price-prev, changePct: ((price-prev)/prev*100), source: "Stooq (SPY)" };
}

// ─── SPARKLINE ───────────────────────────────────────────────────────────────
function Sparkline({ data, color, w = 200, h = 48 }) {
  const [hov, setHov] = useState(null);
  if (!data || data.length < 2) return (
    <div style={{height:h, display:"flex", alignItems:"center", justifyContent:"center"}}>
      <span style={{fontSize:9,color:"#7a6a48",letterSpacing:2}}>30-DAY TREND (ILLUSTRATIVE)</span>
    </div>
  );
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v, i) => ({
    x: 2 + (i / (data.length - 1)) * (w - 4),
    y: 2 + (1 - (v - min) / range) * (h - 4), v
  }));
  const poly = pts.map(p => `${p.x},${p.y}`).join(" ");
  const gid = `g${color.replace(/\W/g,"").slice(0,8)}`;
  return (
    <svg width={w} height={h} style={{overflow:"visible",cursor:"crosshair"}} onMouseLeave={()=>setHov(null)}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`${pts[0].x},${h} ${poly} ${pts[pts.length-1].x},${h}`} fill={`url(#${gid})`}/>
      <polyline points={poly} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
      {pts.map((p,i) => (
        <rect key={i} x={p.x-6} y={0} width={12} height={h} fill="transparent"
          onMouseEnter={()=>setHov(p)}/>
      ))}
      {hov && <>
        <line x1={hov.x} y1={0} x2={hov.x} y2={h} stroke={color} strokeWidth="1" strokeDasharray="3,2" opacity="0.5"/>
        <circle cx={hov.x} cy={hov.y} r="3" fill={color}/>
        <rect x={Math.min(hov.x-28,w-60)} y={hov.y-24} width={60} height={18} rx="4" fill="#111" stroke={color} strokeWidth="0.7"/>
        <text x={Math.min(hov.x,w-30)} y={hov.y-12} textAnchor="middle" fill={color} fontSize="10" fontFamily="'DM Mono',monospace">
          {hov.v >= 1000 ? `$${Math.round(hov.v).toLocaleString()}` : `$${hov.v.toFixed(2)}`}
        </text>
      </>}
    </svg>
  );
}

// ─── CARD ────────────────────────────────────────────────────────────────────
function AssetCard({ id, data, history }) {
  const cfg = ASSETS[id];
  const cardRef = useRef(null);
  const prevPrice = useRef(null);
  const isUp = data?.change >= 0;

  useEffect(() => {
    if (data?.price && prevPrice.current && prevPrice.current !== data.price && cardRef.current) {
      cardRef.current.classList.remove("flash-up","flash-down");
      void cardRef.current.offsetWidth;
      cardRef.current.classList.add(data.price > prevPrice.current ? "flash-up" : "flash-down");
    }
    if (data?.price) prevPrice.current = data.price;
  }, [data?.price]);

  return (
    <div ref={cardRef} style={{
      background:"linear-gradient(145deg,#0f0e0b,#0b0a08)",
      border:`1px solid ${cfg.color}28`, borderRadius:14, padding:"22px 24px",
      position:"relative", overflow:"hidden", transition:"border-color 0.4s",
    }}>
      <div style={{position:"absolute",top:-50,right:-50,width:170,height:170,background:`radial-gradient(circle,${cfg.glow},transparent 70%)`,pointerEvents:"none"}}/>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16,lineHeight:1}}>{cfg.icon}</span>
          <div>
            <div style={{fontSize:11,fontWeight:500,color:cfg.color,letterSpacing:3}}>{cfg.label.toUpperCase()}</div>
            <div style={{fontSize:9,color:"#7a6a48",letterSpacing:2,marginTop:1}}>{cfg.sym}</div>
          </div>
        </div>
        {data?.source && (
          <div style={{fontSize:9,color:"#5a4a30",letterSpacing:1,textAlign:"right",maxWidth:90,lineHeight:1.4}}>
            {data.source}
          </div>
        )}
      </div>

      {/* Loading */}
      {!data && (
        <div style={{height:64,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:16,height:16,border:`2px solid ${cfg.color}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <span style={{fontSize:10,color:"#7a6a48",letterSpacing:2}}>FETCHING LIVE PRICE...</span>
        </div>
      )}

      {/* Error */}
      {data?.error && (
        <div style={{padding:"10px 0"}}>
          <div style={{fontSize:12,color:"#e74c3c",marginBottom:6}}>⚠ Could not load</div>
          <div style={{fontSize:10,color:"#9a8060",lineHeight:1.6}}>{data.error}</div>
          {id === "sp500" && !FINNHUB_KEY && (
            <div style={{marginTop:8,padding:"8px 10px",background:"#1a1200",border:"1px solid #3a2800",borderRadius:6,fontSize:9,color:"#a08040",lineHeight:1.8}}>
              For S&P 500: add a free Finnhub API key at the top of this file.<br/>
              Get one free at <strong style={{color:"#D4AF37"}}>finnhub.io/register</strong>
            </div>
          )}
        </div>
      )}

      {/* Live price */}
      {data && !data.error && (
        <>
          <div style={{fontSize:34,fontWeight:500,color:cfg.color,letterSpacing:-0.5,lineHeight:1,marginBottom:8}}>
            {fmtPrice(data.price, id)}
            <span style={{fontSize:10,color:"#7a6a48",marginLeft:8,letterSpacing:1,fontWeight:400}}>{cfg.unit}</span>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
            {[fmtChange(data.change, id), `${data.changePct >= 0 ? "+" : ""}${data.changePct?.toFixed(2)}%`].map((v,i) => (
              <span key={i} style={{
                display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:4,
                fontSize:12,fontWeight:500,
                background:isUp?"#0b1e0e":"#1e0b0b",
                color:isUp?"#2ecc71":"#e74c3c",
                border:`1px solid ${isUp?"#173520":"#351717"}`,
              }}>{isUp&&i===0?"▲ ":!isUp&&i===0?"▼ ":""}{v}</span>
            ))}
            <span style={{fontSize:9,color:"#5a4a30",letterSpacing:2,display:"flex",alignItems:"center",marginLeft:"auto"}}>24H</span>
          </div>
          <Sparkline data={history} color={cfg.color}/>
        </>
      )}
    </div>
  );
}

// ─── PERF BARS ───────────────────────────────────────────────────────────────
function PerfPanel({ prices }) {
  const items = Object.entries(prices)
    .filter(([,d]) => d?.changePct != null && !d?.error)
    .map(([id,d]) => ({id, ...ASSETS[id], pct: d.changePct}))
    .sort((a,b) => b.pct - a.pct);
  if (!items.length) return null;
  const maxAbs = Math.max(...items.map(i => Math.abs(i.pct)), 0.01);
  return (
    <div style={{background:"#0d0c09",border:"1px solid #1e1c14",borderRadius:12,padding:"18px 22px",marginBottom:18}}>
      <div style={{fontSize:10,letterSpacing:4,color:"#5a4a30",marginBottom:14}}>24H PERFORMANCE — ALL ASSETS</div>
      {items.map(item => {
        const isUp = item.pct >= 0;
        const w = (Math.abs(item.pct) / maxAbs) * 42;
        return (
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <span style={{width:68,fontSize:10,color:item.color,letterSpacing:2,flexShrink:0}}>{item.label.toUpperCase()}</span>
            <div style={{flex:1,height:6,background:"#181410",borderRadius:3,overflow:"visible",position:"relative"}}>
              <div style={{
                position:"absolute", height:"100%",
                width:`${w*2}%`,
                left: isUp ? "50%" : `calc(50% - ${w*2}%)`,
                background: isUp
                  ? `linear-gradient(90deg, ${item.color}55, ${item.color})`
                  : "linear-gradient(90deg, #e74c3c, #e74c3c88)",
                borderRadius:3, transition:"width 0.8s ease",
              }}/>
              <div style={{position:"absolute",left:"50%",top:-4,width:1,height:14,background:"#2a2818"}}/>
            </div>
            <span style={{width:60,textAlign:"right",fontSize:12,fontWeight:500,color:isUp?"#2ecc71":"#e74c3c"}}>
              {isUp?"+":""}{item.pct.toFixed(2)}%
            </span>
          </div>
        );
      })}
    </div>
  );
}

// ─── RATIOS ──────────────────────────────────────────────────────────────────
function RatiosPanel({ prices }) {
  const g = prices.gold?.price, s = prices.silver?.price;
  const b = prices.bitcoin?.price, sp = prices.sp500?.price;
  if (!g || !s) return null;
  const gsr = g / s;
  // Range: 40 (historic low) to 120 (historic high). Position = how far along that range.
  const GSR_MIN = 40, GSR_MAX = 120;
  const pct = Math.min(100, Math.max(0, ((gsr - GSR_MIN) / (GSR_MAX - GSR_MIN)) * 100));
  // High GSR = silver undervalued (right/red side). Low GSR = gold undervalued (left/green side).
  const rc = gsr > 90 ? "#2ecc71" : gsr < 70 ? "#e74c3c" : "#D4AF37";
  const ratios = [
    { label:"Gold / Silver (GSR)", val:gsr.toFixed(2), note:`${Math.round(gsr)} oz silver = 1 oz gold`, hint: gsr>90?"Silver historically cheap (high GSR)":gsr<70?"Gold historically cheap (low GSR)":"Neutral zone", color:"#D4AF37" },
    b ? { label:"Bitcoin / Gold", val:(b/g).toFixed(2), note:`1 BTC buys ${(b/g).toFixed(2)} oz of gold`, hint:"Higher = BTC outperforming", color:"#F7931A" } : null,
    b ? { label:"Bitcoin / Silver", val:Math.round(b/s).toLocaleString(), note:`1 BTC = ${Math.round(b/s).toLocaleString()} oz silver`, hint:"", color:"#F7931A" } : null,
    sp ? { label:"S&P 500 / Gold", val:(sp/g).toFixed(4), note:`SPY ETF ÷ gold (classic macro ratio)`, hint: sp/g < 0.18 ? "Gold outperforming" : "Equities outperforming", color:"#5B9BD5" } : null,
    sp ? { label:"S&P 500 / Silver", val:(sp/s).toFixed(2), note:`SPY ETF ÷ silver`, hint:"", color:"#5B9BD5" } : null,
    (g && b && sp) ? { label:"Gold Mkt vs BTC", val:(g * 1e9 / (b * 21e6)).toFixed(2) + "×", note:"Gold market cap estimated vs BTC theoretical max", hint:"", color:"#c0a060" } : null,
  ].filter(Boolean);

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(210px,1fr))",gap:10,marginBottom:16}}>
        {ratios.map((r,i) => (
          <div key={i} style={{background:"#0d0c09",border:`1px solid ${r.color}22`,borderLeft:`3px solid ${r.color}`,borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#8a7a58",marginBottom:5}}>{r.label.toUpperCase()}</div>
            <div style={{fontSize:22,fontWeight:500,color:r.color,letterSpacing:-0.5,marginBottom:4}}>{r.val}</div>
            <div style={{fontSize:10,color:"#9a8060",marginBottom:r.hint?4:0}}>{r.note}</div>
            {r.hint && <div style={{fontSize:9,color:r.color+"99",letterSpacing:1}}>{r.hint}</div>}
          </div>
        ))}
      </div>

      {/* GSR Gauge */}
      <div style={{background:"#0d0c09",border:"1px solid #1e1c14",borderRadius:10,padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:12,color:"#5a4a30",letterSpacing:3}}>
            GOLD/SILVER RATIO <span style={{fontSize:24,fontWeight:500,color:rc,marginLeft:8}}>{gsr.toFixed(2)}</span>
          </div>
          <span style={{padding:"3px 12px",background:`${rc}18`,border:`1px solid ${rc}40`,borderRadius:4,fontSize:9,letterSpacing:3,color:rc}}>
            {gsr > 90 ? "SILVER UNDERVALUED" : gsr < 70 ? "GOLD UNDERVALUED" : "NEUTRAL ZONE"}
          </span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:8}}>
          <span style={{color:"#e74c3c"}}>← GOLD CHEAP · 40</span>
          <span style={{color:"#D4AF37"}}>80 · NEUTRAL</span>
          <span style={{color:"#2ecc71"}}>120 · SILVER CHEAP →</span>
        </div>
        {/* Gauge with full gradient + position needle */}
        <div style={{position:"relative",height:20,marginBottom:6}}>
          {/* Full gradient always shown */}
          <div style={{position:"absolute",top:6,left:0,right:0,height:8,background:"linear-gradient(90deg,#e74c3c 0%,#D4AF37 50%,#2ecc71 100%)",borderRadius:4}}/>
          {/* Dark overlay right of current position to show "unvisited" zone */}
          <div style={{position:"absolute",top:6,left:`${pct}%`,right:0,height:8,background:"rgba(7,7,7,0.72)",borderRadius:"0 4px 4px 0",transition:"left 1s ease"}}/>
          {/* Glowing needle */}
          <div style={{
            position:"absolute",top:2,left:`${pct}%`,
            transform:"translateX(-50%)",
            width:3,height:16,background:"#ffffff",borderRadius:2,
            boxShadow:`0 0 8px ${rc}, 0 0 16px ${rc}88`,
            transition:"left 1s ease",
          }}/>
          {/* Value bubble above needle */}
          <div style={{
            position:"absolute",top:-20,left:`clamp(20px, ${pct}%, calc(100% - 20px))`,
            transform:"translateX(-50%)",
            fontSize:11,fontWeight:700,color:rc,
            background:"#111",padding:"1px 7px",borderRadius:4,
            border:`1px solid ${rc}55`,whiteSpace:"nowrap",
            transition:"left 1s ease",pointerEvents:"none",
          }}>{gsr.toFixed(1)}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#282010",marginTop:4}}>
          <span>Historic low ~47 (2011)</span><span>Historic high ~124 (COVID 2020)</span>
        </div>
      </div>
    </div>
  );
}

// ─── GITHUB GUIDE ────────────────────────────────────────────────────────────
function GitHubGuide() {
  const [copied, setCopied] = useState(null);
  const copy = (txt, key) => {
    navigator.clipboard.writeText(txt);
    setCopied(key);
    setTimeout(() => setCopied(null), 1800);
  };
  const Cmd = ({children, id}) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#080706",border:"1px solid #2a2510",borderRadius:6,padding:"9px 14px",marginBottom:8,gap:12}}>
      <code style={{fontSize:12,color:"#c8b878",letterSpacing:0.5,flex:1,wordBreak:"break-all"}}>{children}</code>
      <button onClick={() => copy(children, id)} style={{background:copied===id?"#1a3a1a":"#161410",border:`1px solid ${copied===id?"#2ecc71":"#2a2510"}`,borderRadius:4,padding:"3px 10px",fontSize:9,letterSpacing:2,color:copied===id?"#2ecc71":"#5a5040",flexShrink:0,fontFamily:"'DM Mono',monospace",transition:"all 0.2s"}}>
        {copied===id ? "✓ COPIED" : "COPY"}
      </button>
    </div>
  );

  return (
    <div style={{display:"grid",gap:14}}>
      {/* Step 1 */}
      <div style={{background:"#0d0c09",border:"1px solid #D4AF3722",borderLeft:"3px solid #D4AF37",borderRadius:8,padding:"18px 22px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#D4AF37",marginBottom:12}}>STEP 1 — CREATE A GITHUB ACCOUNT & REPO</div>

const CHART_ASSETS = {
  gold:      { label:"Gold",         color:"#D4AF37", icon:"⚜",  isRatio:false },
  silver:    { label:"Silver",       color:"#A8B8C8", icon:"◈",  isRatio:false },
  bitcoin:   { label:"Bitcoin",      color:"#F7931A", icon:"₿",  isRatio:false },
  sp500:     { label:"S&P 500",      color:"#5B9BD5", icon:"📊", isRatio:false },
  gsr:       { label:"Gold/Silver",  color:"#c8a84b", icon:"⚖",  isRatio:true,
               desc:"Gold ÷ Silver — oz of silver per oz of gold",
               fetchA:"gold", fetchB:"silver" },
  btcgold:   { label:"BTC/Gold",     color:"#e8a060", icon:"₿÷⚜", isRatio:true,
               desc:"Bitcoin price ÷ Gold price — oz of gold per BTC",
               fetchA:"bitcoin", fetchB:"gold" },
  btcsp500:  { label:"BTC/S&P500",   color:"#8B7FD4", icon:"₿÷📊", isRatio:true,
               desc:"Bitcoin price ÷ SPY ETF price",
               fetchA:"bitcoin", fetchB:"sp500" },
};

const PERIODS = [
  { key:"1D",  label:"24H",  days:1   },
  { key:"7D",  label:"7D",   days:7   },
  { key:"30D", label:"30D",  days:30  },
  { key:"6M",  label:"6M",   days:182 },
  { key:"1Y",  label:"1Y",   days:365 },
  { key:"5Y",  label:"5Y",   days:1825},
];

async function fetchHistoricalBTC(days) {
  // Kraken OHLC endpoint — CORS enabled, no key needed
  // interval in minutes: 60=1h, 240=4h, 1440=1d, 10080=1w
  const interval = days <= 1 ? 60 : days <= 7 ? 240 : days <= 30 ? 1440 : days <= 365 ? 1440 : 10080;
  const since = Math.floor(Date.now()/1000) - days * 86400;
  const url = `https://api.kraken.com/0/public/OHLC?pair=XBTUSD&interval=${interval}&since=${since}`;
  const r = await fetch(url, { cache:"no-store" });
  if (!r.ok) throw new Error(`Kraken OHLC: HTTP ${r.status}`);
  const d = await r.json();
  if (d.error && d.error.length) throw new Error(`Kraken: ${d.error[0]}`);
  // Each entry: [time, open, high, low, close, vwap, volume, count]
  return (d.result.XXBTZUSD || d.result.XBTUSD || []).map(k => ({
    ts: k[0] * 1000,
    price: parseFloat(k[4])
  }));
}

async function fetchHistoricalSPY(days) {
  // Use Finnhub candles endpoint if key available, else Stooq proxy
  if (FINNHUB_KEY) {
    const resolution = days <= 7 ? "30" : days <= 30 ? "D" : "W";
    const to   = Math.floor(Date.now() / 1000);
    const from = to - days * 86400;
    const url  = `https://finnhub.io/api/v1/stock/candle?symbol=SPY&resolution=${resolution}&from=${from}&to=${to}&token=${FINNHUB_KEY}`;
    const r = await fetch(url, { cache:"no-store" });
    if (!r.ok) throw new Error(`Finnhub candles: HTTP ${r.status}`);
    const d = await r.json();
    if (d.s !== "ok" || !d.t || !d.c) throw new Error("Finnhub candles: no data");
    return d.t.map((ts, i) => ({ ts: ts * 1000, price: d.c[i] }));
  }
  // Fallback: Stooq proxy
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - days);
  const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const csv_url = `https://stooq.com/q/d/l/?s=spy.us&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(csv_url)}`;
  const r = await fetch(proxy, { cache:"no-store" });
  if (!r.ok) throw new Error("SPY historical: proxy failed");
  const j = await r.json();
  const lines = (j.contents || "").trim().split("\n").slice(1);
  return lines.map(l => {
    const cols = l.split(",");
    const [year,month,day] = cols[0].split("-").map(Number);
    return { ts: new Date(year, month-1, day).getTime(), price: parseFloat(cols[4]) };
  }).filter(p => !isNaN(p.price));
}

async function fetchHistoricalMetal(sym, days) {
  // Stooq via allorigins proxy — tracks xauusd and xagusd forex pairs
  const ticker = sym === "XAU" ? "xauusd" : "xagusd";
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - Math.ceil(days * 1.4)); // extra buffer for weekends
  const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const stooqUrl = `https://stooq.com/q/d/l/?s=${ticker}&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(stooqUrl)}`;
  const r = await fetch(proxy, { cache:"no-store" });
  if (!r.ok) throw new Error(`Stooq ${sym} proxy failed: HTTP ${r.status}`);
  const j = await r.json();
  const lines = (j.contents || "").trim().split("\n").slice(1); // skip header
  const data = lines.map(l => {
    const cols = l.split(",");
    if (cols.length < 5) return null;
    const [year,month,day] = cols[0].split("-").map(Number);
    const price = parseFloat(cols[4]); // Close price
    if (isNaN(price) || price <= 0) return null;
    return { ts: new Date(year, month-1, day).getTime(), price };
  }).filter(Boolean);
  if (data.length < 2) throw new Error(`Not enough ${sym} historical data from Stooq`);
  return data;
}

// Align two time series by timestamp (daily resolution match)
function alignSeries(a, b) {
  // Build map from date-string to price for series b
  const bMap = {};
  b.forEach(p => { bMap[new Date(p.ts).toDateString()] = p.price; });
  return a
    .map(p => {
      const key = new Date(p.ts).toDateString();
      const bPrice = bMap[key];
      if (!bPrice || isNaN(bPrice) || bPrice === 0) return null;
      return { ts: p.ts, price: p.price / bPrice };
    })
    .filter(Boolean);
}

async function fetchHistoricalRatio(asset, days) {
  const cfg = CHART_ASSETS[asset];
  const [numData, denData] = await Promise.all([
    fetchHistoricalForAsset(cfg.numerator, days),
    fetchHistoricalForAsset(cfg.denominator, days),
  ]);
  if (!numData.length || !denData.length) throw new Error("Could not load ratio data");
  return alignSeries(numData, denData);
}

async function fetchHistoricalForAsset(id, days) {
  if (id === "bitcoin") return fetchHistoricalBTC(days);
  if (id === "sp500")   return fetchHistoricalSPY(days);
  if (id === "gold")    return fetchHistoricalMetal("XAU", days);
  if (id === "silver")  return fetchHistoricalMetal("XAG", days);
  throw new Error("Unknown asset: " + id);
}

function PriceChart({ currentPrices }) {
  const [asset, setAsset] = React.useState("gold");
  const [period, setPeriod] = React.useState("30D");
  const [chartData, setChartData] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [hovered, setHovered] = React.useState(null);
  const svgRef = React.useRef(null);
  const cfg = CHART_ASSETS[asset];
  const per = PERIODS.find(p => p.key === period);

  React.useEffect(() => {
    setLoading(true);
    setError(null);
    setChartData([]);

    const load = async () => {
      try {
        let data = [];
        const fetchSeries = async (id) => {
          if (id === "bitcoin") return await fetchHistoricalBTC(per.days);
          if (id === "sp500")   return await fetchHistoricalSPY(per.days);
          if (id === "gold")    return await fetchHistoricalMetal("XAU", per.days);
          if (id === "silver")  return await fetchHistoricalMetal("XAG", per.days);
          return [];
        };
        if (cfg.isRatio) {
          // Fetch both series in parallel, then align by date and divide
          const [seriesA, seriesB] = await Promise.all([
            fetchSeries(cfg.fetchA),
            fetchSeries(cfg.fetchB),
          ]);
          if (!seriesA.length || !seriesB.length) throw new Error("Could not load one or both series for ratio");
          // Align: for each point in A, find nearest B by timestamp
          const bMap = new Map(seriesB.map(p => [p.ts, p.price]));
          const bTimes = seriesB.map(p => p.ts).sort((a,b)=>a-b);
          const nearest = (ts) => {
            let lo=0, hi=bTimes.length-1;
            while(lo<hi){ const mid=(lo+hi)>>1; if(bTimes[mid]<ts) lo=mid+1; else hi=mid; }
            return seriesB[lo]?.price;
          };
          data = seriesA.map(a => {
            const bPrice = bMap.get(a.ts) ?? nearest(a.ts);
            if (!bPrice || bPrice === 0) return null;
            return { ts: a.ts, price: a.price / bPrice };
          }).filter(Boolean);
        } else {
          data = await fetchSeries(asset);
        }
        if (!data || data.length < 2) throw new Error("Not enough data points returned");
        setChartData(data);
      } catch(e) {
        setError(e.message);
      }
      setLoading(false);
    };
    load();
  }, [asset, period]);

  const W = 900, H = 260, PL = 72, PR = 20, PT = 36, PB = 32;
  const cW = W - PL - PR, cH = H - PT - PB;

  let path = "", areaPath = "", priceLabels = [], timeLabels = [], changeInfo = null;

  if (chartData.length >= 2) {
    const prices = chartData.map(d => d.price);
    const times  = chartData.map(d => d.ts);
    const minP = Math.min(...prices), maxP = Math.max(...prices);
    const minT = Math.min(...times),  maxT = Math.max(...times);
    const rangeP = maxP - minP || 1, rangeT = maxT - minT || 1;

    const px = ts  => PL + ((ts  - minT) / rangeT) * cW;
    const py = val => PT + (1 - (val - minP) / rangeP) * cH;

    const pts = chartData.map(d => ({ x: px(d.ts), y: py(d.price), ts: d.ts, price: d.price }));
    path = pts.map((p,i) => `${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    areaPath = path + ` L${pts[pts.length-1].x.toFixed(1)},${(PT+cH).toFixed(1)} L${pts[0].x.toFixed(1)},${(PT+cH).toFixed(1)} Z`;

    // Y axis labels (5 ticks)
    for (let i = 0; i <= 4; i++) {
      const val = minP + (i/4) * rangeP;
      const y = py(val);
      const label = cfg.isRatio
        ? (val >= 1000 ? val.toLocaleString(undefined,{maximumFractionDigits:0})
           : val >= 10  ? val.toFixed(2)
           : val.toFixed(4))
        : (val >= 10000 ? `$${Math.round(val/1000)}k`
           : val >= 1000  ? `$${val.toLocaleString(undefined,{maximumFractionDigits:0})}`
           : val >= 10    ? `$${val.toFixed(1)}`
           : `$${val.toFixed(2)}`);
      priceLabels.push({ y, label });
    }

    // X axis labels (5 ticks)
    for (let i = 0; i <= 4; i++) {
      const ts = minT + (i/4) * rangeT;
      const x  = px(ts);
      const d  = new Date(ts);
      const label = per.days <= 1   ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
                  : per.days <= 7   ? d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})
                  : per.days <= 182 ? d.toLocaleDateString([],{month:'short',day:'numeric'})
                  : d.toLocaleDateString([],{month:'short',year:'2-digit'});
      timeLabels.push({ x, label });
    }

    const first = prices[0], last = prices[prices.length-1];
    const chg = last - first, chgPct = (chg/first)*100;
    changeInfo = { chg, chgPct, isUp: chg >= 0, first, last };

    // Hovered crosshair
    if (hovered) {
      const nearestPt = pts.reduce((best, pt) => Math.abs(pt.x - hovered.svgX) < Math.abs(best.x - hovered.svgX) ? pt : best);
      hovered.nearest = nearestPt;
    }
  }

  const handleMouseMove = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const scaleX = W / rect.width;
    const svgX = (e.clientX - rect.left) * scaleX;
    if (svgX >= PL && svgX <= PL + cW) setHovered({ svgX });
    else setHovered(null);
  };

  return (
    <div style={{background:"linear-gradient(145deg,#0f0e0b,#0a0908)",border:"1px solid #2a2410",borderRadius:14,padding:"20px 24px",marginTop:18}}>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14,color:cfg.color}}>{cfg.icon}</span>
          <span style={{fontSize:11,letterSpacing:4,color:cfg.color,fontWeight:500}}>{cfg.label.toUpperCase()}</span>
          {changeInfo && (
            <span style={{
              fontSize:12,fontWeight:500,padding:"2px 10px",borderRadius:4,marginLeft:8,
              background:changeInfo.isUp?"#0b1e0e":"#1e0b0b",
              color:changeInfo.isUp?"#2ecc71":"#e74c3c",
              border:`1px solid ${changeInfo.isUp?"#173520":"#351717"}`,
            }}>
              {changeInfo.isUp?"+":""}{changeInfo.chgPct.toFixed(2)}%{!cfg.isRatio && ` · ${changeInfo.isUp?"+":"-"}$${Math.abs(changeInfo.chg).toLocaleString(undefined,{maximumFractionDigits:2})}`}
            </span>
          )}
          {changeInfo && (
            <span style={{fontSize:10,color:"#5a5040",letterSpacing:1,marginLeft:4}}>over {per.label}</span>
          )}
          {cfg.isRatio && cfg.desc && (
            <span style={{fontSize:9,color:"#4a3a20",letterSpacing:1,marginLeft:8}}>— {cfg.desc}</span>
          )}
        </div>

        {/* Period selector */}
        <div style={{display:"flex",gap:3}}>
          {PERIODS.map(p => (
            <button key={p.key} onClick={()=>setPeriod(p.key)} style={{
              padding:"4px 12px",fontSize:10,letterSpacing:2,borderRadius:4,cursor:"pointer",
              background:period===p.key?cfg.color:"transparent",
              color:period===p.key?"#080808":cfg.color+"99",
              border:`1px solid ${period===p.key?cfg.color:cfg.color+"33"}`,
              fontFamily:"'DM Mono',monospace",transition:"all 0.15s",
            }}>{p.label}</button>
          ))}
        </div>
      </div>

      {/* Asset selector — two rows */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:8,letterSpacing:3,color:"#3a3020",marginBottom:6}}>PRICE</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {Object.entries(CHART_ASSETS).filter(([,c])=>!c.isRatio).map(([id, c]) => (
            <button key={id} onClick={()=>setAsset(id)} style={{
              display:"flex",alignItems:"center",gap:6,
              padding:"5px 14px",fontSize:10,letterSpacing:2,borderRadius:6,cursor:"pointer",
              background:asset===id?`${c.color}18`:"transparent",
              color:asset===id?c.color:"#5a5040",
              border:`1px solid ${asset===id?c.color+"66":"#2a2410"}`,
              fontFamily:"'DM Mono',monospace",transition:"all 0.15s",
            }}>
              <span>{c.icon}</span> {c.label.toUpperCase()}
            </button>
          ))}
        </div>
        <div style={{fontSize:8,letterSpacing:3,color:"#3a3020",marginBottom:6}}>RATIOS</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {Object.entries(CHART_ASSETS).filter(([,c])=>c.isRatio).map(([id, c]) => (
            <button key={id} onClick={()=>setAsset(id)} style={{
              display:"flex",alignItems:"center",gap:6,
              padding:"5px 14px",fontSize:10,letterSpacing:2,borderRadius:6,cursor:"pointer",
              background:asset===id?`${c.color}18`:"transparent",
              color:asset===id?c.color:"#5a5040",
              border:`1px solid ${asset===id?c.color+"66":"#2a2410"}`,
              fontFamily:"'DM Mono',monospace",transition:"all 0.15s",
            }}>
              <span style={{fontSize:11}}>{c.icon}</span> {c.label.toUpperCase()}
            </button>
          ))}
        </div>
      </div>

      {/* Chart */}
      <div style={{position:"relative",width:"100%"}}>
        {loading && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,9,8,0.7)",borderRadius:8,zIndex:10}}>
            <div style={{textAlign:"center"}}>
              <div style={{width:24,height:24,border:`2px solid ${cfg.color}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 10px"}}/>
              <div style={{fontSize:10,color:cfg.color+"88",letterSpacing:3}}>LOADING CHART...</div>
            </div>
          </div>
        )}
        {error && !loading && (
          <div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
            <div style={{fontSize:12,color:"#e74c3c"}}>⚠ Could not load historical data</div>
            <div style={{fontSize:10,color:"#5a4030",maxWidth:400,textAlign:"center",lineHeight:1.6}}>{error}</div>
            <div style={{fontSize:9,color:"#3a3020",marginTop:4}}>Historical data requires a live server (not file://). Deploy to GitHub Pages to use this feature.</div>
          </div>
        )}
        {!error && chartData.length >= 2 && (
          <svg
            ref={svgRef}
            viewBox={`0 0 ${W} ${H}`}
            style={{width:"100%",height:"auto",display:"block",overflow:"visible"}}
            onMouseMove={handleMouseMove}
            onMouseLeave={()=>setHovered(null)}
          >
            <defs>
              <linearGradient id={`chartGrad${asset}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={cfg.color} stopOpacity="0.25"/>
                <stop offset="85%" stopColor={cfg.color} stopOpacity="0"/>
              </linearGradient>
              <clipPath id="chartClip">
                <rect x={PL} y={PT} width={cW} height={cH}/>
              </clipPath>
            </defs>

            {/* Grid lines */}
            {priceLabels.map((pl, i) => (
              <line key={i} x1={PL} y1={pl.y} x2={PL+cW} y2={pl.y}
                stroke="#1e1c14" strokeWidth="1" strokeDasharray="4,4"/>
            ))}

            {/* Area fill */}
            <path d={areaPath} fill={`url(#chartGrad${asset})`} clipPath="url(#chartClip)"/>

            {/* Price line */}
            <path d={path} fill="none" stroke={cfg.color} strokeWidth="2"
              strokeLinejoin="round" strokeLinecap="round" clipPath="url(#chartClip)"/>

            {/* Y axis labels */}
            {priceLabels.map((pl, i) => (
              <text key={i} x={PL-8} y={pl.y+4} textAnchor="end"
                fill="#6a5a40" fontSize="11" fontFamily="'DM Mono',monospace">{pl.label}</text>
            ))}

            {/* X axis labels */}
            {timeLabels.map((tl, i) => (
              <text key={i} x={tl.x} y={PT+cH+20} textAnchor="middle"
                fill="#6a5a40" fontSize="10" fontFamily="'DM Mono',monospace">{tl.label}</text>
            ))}

            {/* Current price dot at end of line */}
            {chartData.length >= 2 && (() => {
              const prices = chartData.map(d => d.price);
              const times  = chartData.map(d => d.ts);
              const minP = Math.min(...prices), maxP = Math.max(...prices), rangeP = maxP-minP||1;
              const minT = Math.min(...times),  maxT = Math.max(...times),  rangeT = maxT-minT||1;
              const lx = PL + cW;
              const ly = PT + (1 - (prices[prices.length-1]-minP)/rangeP) * cH;
              return (
                <g>
                  <circle cx={lx} cy={ly} r="5" fill={cfg.color} opacity="0.4"/>
                  <circle cx={lx} cy={ly} r="3" fill={cfg.color}/>
                </g>
              );
            })()}

            {/* Hover crosshair */}
            {hovered && hovered.nearest && (
              <g>
                <line x1={hovered.nearest.x} y1={PT} x2={hovered.nearest.x} y2={PT+cH}
                  stroke={cfg.color} strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
                <circle cx={hovered.nearest.x} cy={hovered.nearest.y} r="4" fill={cfg.color}/>
                {/* Tooltip */}
                {(() => {
                  const bx = Math.min(hovered.nearest.x - 60, W - 140);
                  const by = Math.max(hovered.nearest.y - 50, PT);
                  const price = hovered.nearest.price;
                  const label = cfg.isRatio
                    ? (price >= 1000 ? price.toLocaleString(undefined,{maximumFractionDigits:2})
                       : price >= 10   ? price.toFixed(4)
                       : price.toFixed(6))
                    : (price >= 10000 ? `$${Math.round(price).toLocaleString()}`
                       : price >= 100  ? `$${price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`
                       : `$${price.toFixed(3)}`);
                  const dateLabel = new Date(hovered.nearest.ts).toLocaleDateString([],{
                    month:'short', day:'numeric',
                    year: per.days > 182 ? 'numeric' : undefined,
                    hour: per.days <= 1 ? '2-digit' : undefined,
                    minute: per.days <= 1 ? '2-digit' : undefined,
                  });
                  return (
                    <g>
                      <rect x={bx} y={by} width={130} height={40} rx="6"
                        fill="#0f0e0b" stroke={cfg.color} strokeWidth="0.8" opacity="0.95"/>
                      <text x={bx+10} y={by+15} fill={cfg.color} fontSize="13" fontWeight="600"
                        fontFamily="'DM Mono',monospace">{label}</text>
                      <text x={bx+10} y={by+30} fill="#6a5a40" fontSize="10"
                        fontFamily="'DM Mono',monospace">{dateLabel}</text>
                    </g>
                  );
                })()}
              </g>
            )}
          </svg>
        )}
        {!loading && !error && chartData.length === 0 && (
          <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:10,color:"#4a4030",letterSpacing:3}}>SELECT AN ASSET AND PERIOD</div>
          </div>
        )}
      </div>
      <div style={{fontSize:8,color:"#3a3028",letterSpacing:2,marginTop:8,textAlign:"right"}}>
        SOURCES: COINGECKO (METALS & BTC) · COINGECKO (BTC) · STOOQ (SPY) · HISTORICAL DATA FOR INFORMATIONAL USE ONLY
      </div>
    </div>
  );
}


// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {

  const [tab, setTab] = useState("overview");
  const [refreshing, setRefreshing] = useState(false);

  const makeHist = (price, vol = 0.012) => {
    const h = []; let p = price * (0.97 - Math.random() * 0.03);
    for (let i = 0; i < 30; i++) { p *= 1 + (Math.random() - 0.48) * vol; h.push(+p.toFixed(4)); }
    h.push(price); return h;
  };

  const fetchAll = useCallback(async (isRefresh = false) => {
    if (isRefresh) setRefreshing(true);
    const fetchers = [
      fetchMetal("XAU"),
      fetchMetal("XAG"),
      fetchBitcoin(),
      fetchSP500(),
    ];
    const keys = ["gold","silver","bitcoin","sp500"];
    const vols = { gold:0.009, silver:0.014, bitcoin:0.04, sp500:0.008 };
    const results = await Promise.allSettled(fetchers);
    const np = {}, nh = {};
    results.forEach((r,i) => {
      const k = keys[i];
      if (r.status === "fulfilled") {
        np[k] = r.value;
        nh[k] = makeHist(r.value.price, vols[k]);
      } else {
        np[k] = { error: r.reason?.message ?? "Unknown error" };
        nh[k] = [];
      }
    });
    setPrices(np); setHistories(nh);
    setLastUpdate(new Date()); setLoading(false); setRefreshing(false);
  }, []);

  useEffect(() => {
    fetchAll();
    const iv = setInterval(() => fetchAll(true), 90000);
    return () => clearInterval(iv);
  }, [fetchAll]);

  const allFailed = !loading && Object.values(prices).every(d => !d || d.error);

  return (
    <div style={{background:"#070707",minHeight:"100vh",fontFamily:"'DM Mono',monospace",color:"#e8e0d0"}}>

          <div>
            <div style={{fontSize:13,letterSpacing:4,color:"#D4AF37",fontWeight:500}}>BULLION TRACKER</div>

          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {lastUpdate && <div style={{fontSize:9,color:"#5a4a30",letterSpacing:1,textAlign:"right"}}><div>UPDATED</div><div style={{color:"#8a7a58"}}>{lastUpdate.toLocaleTimeString()}</div></div>}
          <button onClick={() => fetchAll(true)} disabled={refreshing} style={{padding:"5px 13px",fontSize:10,letterSpacing:2,background:"transparent",color:refreshing?"#5a4a30":"#D4AF37",border:`1px solid ${refreshing?"#5a4a30":"#D4AF37"}`,borderRadius:4,fontFamily:"'DM Mono',monospace",transition:"all 0.2s"}}>
            {refreshing ? "..." : "↻ REFRESH"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:7,padding:"5px 11px",background:"#0d1a0d",border:"1px solid #1a3a1a",borderRadius:4}}>
            <div style={{width:6,height:6,background:"#2ecc71",borderRadius:"50%",boxShadow:"0 0 6px #2ecc71",animation:"blink 2s infinite"}}/>
            <span style={{fontSize:9,letterSpacing:3,color:"#2ecc71"}}>LIVE</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1080,margin:"0 auto",padding:"22px 16px"}}>
        {/* Source badges */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:18,fontSize:9,letterSpacing:1}}>
          {[
            {label:"Gold & Silver",src:"Finnhub",color:"#D4AF37"},
            {label:"Bitcoin",src:"Kraken",color:"#F7931A"},
            {label:"S&P 500",src: FINNHUB_KEY ? "Finnhub (SPY)" : "Stooq/allorigins (SPY)",color:"#5B9BD5"},
          ].map(b => (

              <span style={{color:b.color}}>{b.label}</span> via {b.src}

              <div className="fade-up">
